<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            color: #333;
            transition: background 0.5s;
        }
        .container {
            width: 90%;
            margin: auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
        /* Responsive styles */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            table {
                font-size: 0.8em;
            }
        }
        #toggle-mode {
            position: fixed;
            top: 20px;
            right: 20px;
        }
        #predictions {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }
        .prediction {
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
            margin: 10px;
            flex: 1 1 30%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        .prediction:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Football Predictor</h1>
        <button id="toggle-mode">Toggle Dark/Light Mode</button>
        <div id="predictions">
            <div class="prediction">Prediction 1</div>
            <div class="prediction">Prediction 2</div>
            <div class="prediction">Prediction 3</div>
            <div class="prediction">Prediction 4</div>
            <div class="prediction">Prediction 5</div>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Match</th>
                    <th>Prediction</th>
                    <th>Stats</th>
                </tr>
            </thead>
            <tbody id="stats-table">
                <tr>
                    <td>Team A vs Team B</td>
                    <td>Home Win</td>
                    <td>60% chances</td>
                </tr>
                <tr>
                    <td>Team C vs Team D</td>
                    <td>Away Win</td>
                    <td>45% chances</td>
                </tr>
            </tbody>
        </table>
    </div>
    <script>
        const toggleButton = document.getElementById('toggle-mode');
        toggleButton.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            document.body.style.background = document.body.classList.contains('dark-mode') ? '#333' : 'linear-gradient(to right, #ff7e5f, #feb47b)';
            document.body.style.color = document.body.classList.contains('dark-mode') ? '#fff' : '#333';
        });
        async function fetchPredictions() {
            const response = await fetch('https://api.football-data.org/v2/matches');
            const data = await response.json();
            // Processing logic for prediction goes here
            console.log(data);
        }
        fetchPredictions();
    </script>
</body>
</html>
